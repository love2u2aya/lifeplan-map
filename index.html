<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライフプランニング宇宙 — 3D相互影響マップ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:#04060f; font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif; color:#e8eaed; }
  #graph { position:absolute; inset:0; }
  .glass { background:rgba(10,15,28,.78); border:1px solid rgba(120,150,210,.22); border-radius:14px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 8px 32px rgba(0,0,0,.45); }
  #toolbar { position:absolute; top:14px; left:14px; z-index:10; padding:12px 14px; max-width:540px; }
  #toolbar h1 { font-size:14px; margin-bottom:10px; background:linear-gradient(90deg,#ffd479,#ff9d6c); -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:.5px; }
  .lvbtns { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .lvbtn { border:1px solid rgba(120,150,210,.3); background:rgba(30,40,66,.6); color:#cfd6df; border-radius:20px; padding:5px 12px; font-size:12px; cursor:pointer; transition:all .2s; }
  .lvbtn:hover { border-color:#ffd479; }
  .lvbtn.active { background:linear-gradient(135deg,#3d5a80,#5a4a8a); border-color:#8fb8e8; color:#fff; box-shadow:0 0 12px rgba(110,168,216,.5); }
  .lvbtn.diag { border-color:#ffd479; color:#ffd479; }
  .lvbtn.diag:hover { background:rgba(90,70,30,.5); box-shadow:0 0 12px rgba(255,212,121,.4); }
  #search { width:100%; padding:7px 10px; border-radius:8px; border:1px solid rgba(120,150,210,.3); background:rgba(20,28,46,.7); color:#e8eaed; font-size:13px; outline:none; }
  #search:focus { border-color:#ffd479; box-shadow:0 0 10px rgba(255,212,121,.25); }
  .legend { display:flex; gap:10px; flex-wrap:wrap; margin-top:9px; font-size:11px; color:#aab3bf; }
  .legend span { display:inline-flex; align-items:center; gap:4px; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; box-shadow:0 0 8px currentColor; }
  #panel { position:absolute; top:14px; right:14px; bottom:14px; width:330px; z-index:10; padding:16px; overflow-y:auto; }
  #panel::-webkit-scrollbar { width:6px; } #panel::-webkit-scrollbar-thumb { background:rgba(120,150,210,.3); border-radius:3px; }
  #panel h2 { font-size:17px; color:#ffd479; margin-bottom:6px; text-shadow:0 0 16px rgba(255,212,121,.4); }
  #panel .meta { font-size:12px; color:#9aa5b1; margin-bottom:10px; }
  #panel .badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; color:#fff; margin-right:6px; }
  #panel p { font-size:13px; line-height:1.75; margin-bottom:14px; }
  #panel h3 { font-size:12px; color:#8fa0b5; margin:12px 0 8px; letter-spacing:1px; }
  .chip { display:inline-block; margin:0 6px 7px 0; padding:4px 11px; background:rgba(36,48,74,.8); border:1px solid #3a4a5f; border-radius:14px; font-size:12px; cursor:pointer; color:#cfe0f0; transition:all .15s; }
  .chip:hover { background:rgba(70,90,130,.9); box-shadow:0 0 10px rgba(140,180,255,.3); transform:translateY(-1px); }
  .hint { color:#8a96a6; font-size:12px; line-height:1.9; }
  .pbtn { display:inline-block; margin-top:6px; padding:7px 14px; border-radius:8px; border:1px solid #ffd479; background:rgba(90,70,30,.4); color:#ffd479; font-size:13px; cursor:pointer; }
  .pbtn:hover { box-shadow:0 0 14px rgba(255,212,121,.4); }
  #loading { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#04060f; transition:opacity .8s; }
  #loading .orb { width:56px; height:56px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #ffd479, #b0682a 60%, transparent); box-shadow:0 0 44px #ffd479aa; animation:pulse 1.4s ease-in-out infinite; margin-bottom:22px; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.18);opacity:1} }
  #loading div.txt { color:#aab8cf; font-size:13px; letter-spacing:2px; }
  #fallback { display:none; position:absolute; inset:0; z-index:60; background:#0a0f1c; padding:60px 30px; text-align:center; font-size:14px; line-height:2; }
  #fallback a { color:#ffd479; }
  .foot { position:absolute; bottom:12px; left:14px; z-index:10; font-size:11px; color:#5f6c80; }
  .foot a { color:#8fa8cf; text-decoration:none; }
  /* 診断モーダル */
  #diag { display:none; position:absolute; inset:0; z-index:40; background:rgba(2,4,10,.72); }
  #diag .box { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:min(560px,92vw); max-height:88vh; overflow-y:auto; padding:22px 24px; }
  #diag h2 { font-size:17px; color:#ffd479; margin-bottom:4px; }
  #diag .sub { font-size:12px; color:#8a96a6; margin-bottom:14px; }
  #diag h3 { font-size:13px; color:#cfd9ea; margin:14px 0 7px; }
  .opts { display:flex; flex-wrap:wrap; gap:7px; }
  .opt { padding:6px 13px; border-radius:18px; border:1px solid rgba(120,150,210,.35); background:rgba(30,40,66,.6); color:#cfd6df; font-size:13px; cursor:pointer; user-select:none; transition:all .15s; }
  .opt.on { background:linear-gradient(135deg,#7a5a20,#5a4a8a); border-color:#ffd479; color:#fff; box-shadow:0 0 10px rgba(255,212,121,.45); }
  #diag .actions { margin-top:20px; display:flex; gap:10px; justify-content:flex-end; }
  .gbtn { padding:9px 20px; border-radius:9px; font-size:14px; cursor:pointer; border:1px solid rgba(120,150,210,.35); background:rgba(30,40,66,.6); color:#cfd6df; }
  .gbtn.go { background:linear-gradient(135deg,#b8860b,#8a5aaa); border-color:#ffd479; color:#fff; font-weight:bold; }
  .gbtn.go:hover { box-shadow:0 0 18px rgba(255,212,121,.55); }
  .rank1 { border-color:#ffd479 !important; box-shadow:0 0 8px rgba(255,212,121,.35); }
  /* ホバー時の説明チップ */
  #tip { position:absolute; z-index:30; max-width:310px; padding:10px 13px; font-size:12px; line-height:1.7; pointer-events:none; display:none; }
  #tip b.t { color:#ffd479; font-size:13px; }
  #tip .lv { display:inline-block; padding:1px 7px; border-radius:9px; font-size:10px; color:#0a0f1c; margin-left:6px; font-weight:bold; }
  @media (max-width:900px){ #panel{ width:min(86vw,330px); top:auto; max-height:46vh; } #toolbar{ max-width:78vw; } }
</style>
</head>
<body>
<div id="graph"></div>

<div id="toolbar" class="glass">
  <h1>🌌 ライフプランニング宇宙 — クリックした要素の影響が光ります</h1>
  <div class="lvbtns" id="lvbtns"></div>
  <input id="search" type="text" placeholder="🔍 検索してその星へ飛ぶ（例: 年金 / NISA / 相続）">
  <div class="legend">
    <span style="color:#3dffa0"><i class="dot" style="background:#3dffa0"></i></span><span>L1 基本</span>
    <span style="color:#4dc3ff"><i class="dot" style="background:#4dc3ff"></i></span><span>L2 FP級</span>
    <span style="color:#b07bff"><i class="dot" style="background:#b07bff"></i></span><span>L3 実務</span>
    <span style="color:#ffab4d"><i class="dot" style="background:#ffab4d"></i></span><span>L4 専門家</span>
    <span style="color:#ff5c8a"><i class="dot" style="background:#ff5c8a"></i></span><span>L5 超マニア</span>
  </div>
</div>

<div id="panel" class="glass"></div>

<div class="foot">95要素 × 217リンク ｜ <a href="map2d.html">🗺 2D俯瞰版</a></div>

<div id="tip" class="glass"></div>

<div id="loading"><div class="orb"></div><div class="txt">ライフプラン宇宙を生成中…</div></div>
<div id="fallback" class="glass">
  ⚠️ 3D表示ライブラリの読み込みに失敗しました（オフライン等）。<br>
  <a href="map2d.html">2D版マップ</a> をご利用ください。
</div>

<!-- 診断モーダル -->
<div id="diag">
  <div class="box glass">
    <h2>🧭 わたしの優先マップ診断</h2>
    <div class="sub">5つ答えると、あなたが優先すべきテーマだけが「星座」として夜空に浮かびます。</div>
    <div id="qs"></div>
    <div class="actions">
      <button class="gbtn" id="diagCancel">閉じる</button>
      <button class="gbtn go" id="diagGo">⭐ わたしの星座を描く</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js" onerror="window.__cdnFail=1"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js" onerror="window.__cdnFail=1"></script>
<script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js" onerror="window.__cdnFail=1"></script>
<script>
(function(){
"use strict";
if (window.__cdnFail || !window.ForceGraph3D || !window.THREE || !window.SpriteText) {
  document.getElementById("loading").remove();
  document.getElementById("fallback").style.display = "block";
  return;
}
var LV = {1:"#3dffa0", 2:"#4dc3ff", 3:"#b07bff", 4:"#ffab4d", 5:"#ff5c8a"};
var GOLD = "#ffd479";
var DOMAINS = window.LP.DOMAINS, NODES = window.LP.NODES;

// ---- グラフデータ ----
var nodes = NODES.map(function(n){ return Object.assign({}, n); });
var byId = {}; nodes.forEach(function(n){ byId[n.id] = n; });
var seenE = {}, links = [];
nodes.forEach(function(n){ (n.links||[]).forEach(function(t){
  if(!byId[t]) return;
  var k = n.id < t ? n.id+"|"+t : t+"|"+n.id;
  if(!seenE[k]){ seenE[k]=1; links.push({source:n.id, target:t}); }
});});
var deg = {}; links.forEach(function(l){ deg[l.source]=(deg[l.source]||0)+1; deg[l.target]=(deg[l.target]||0)+1; });
// 隣接マップ（※Graph初期化前＝source/targetがまだID文字列のうちに作る）
var adj = {}; nodes.forEach(function(n){ adj[n.id]=[]; });
links.forEach(function(l){ adj[l.source].push(l.target); adj[l.target].push(l.source); });

var CX=1450, CY=960, S=0.62;
nodes.forEach(function(n){
  var d = DOMAINS[n.dom];
  n.ax=(d.x-CX)*S; n.ay=-(d.y-CY)*S;
  n.x=n.ax+(Math.random()-0.5)*60; n.y=n.ay+(Math.random()-0.5)*60; n.z=(Math.random()-0.5)*120;
});

// ---- ハロー（発光）テクスチャ ----
var haloCache = {};
function hex2rgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function haloTexture(color){
  if(haloCache[color]) return haloCache[color];
  var c=document.createElement("canvas"); c.width=c.height=128;
  var x=c.getContext("2d"), rgb=hex2rgb(color);
  var g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0, "rgba("+rgb+",0.85)");
  g.addColorStop(0.25,"rgba("+rgb+",0.30)");
  g.addColorStop(1, "rgba("+rgb+",0)");
  x.fillStyle=g; x.fillRect(0,0,128,128);
  var tex=new THREE.CanvasTexture(c);
  haloCache[color]=tex; return tex;
}
function makeHalo(color, size){
  var m=new THREE.SpriteMaterial({map:haloTexture(color), blending:THREE.AdditiveBlending, depthWrite:false, transparent:true});
  var s=new THREE.Sprite(m); s.scale.set(size,size,1); return s;
}

// ---- 状態 ----
var mode=null;            // null | "node" | "con"
var selected=null;        // modeが"node"のときの選択ノード
var actN={}, actL={};     // ハイライト対象（id→true / linkキー→true）
var conRank=[];           // 診断の順位リスト
var maxLv=5;
var hoverNode=null;       // ホバー中の星
var mouse={x:0,y:0};
var tour={on:false, timer:null, visited:{}};

// ---- ホバー説明チップ ----
var tip=document.getElementById("tip");
var tipFor=null;
function updateTip(){
  if(hoverNode!==tipFor){
    tipFor=hoverNode;
    if(!hoverNode || tour.on){ tip.style.display="none"; }
    else{
      var n=hoverNode;
      tip.innerHTML = '<b class="t">'+n.label+'</b>'
        + '<span class="lv" style="background:'+LV[n.lv]+'">L'+n.lv+'</span>'
        + '<span style="color:#8fa0b5;font-size:10px;margin-left:6px">'+DOMAINS[n.dom].name+'</span>'
        + '<div style="margin-top:5px;color:#c9d4e3">'+n.desc+'</div>';
      tip.style.display="block";
    }
  }
  if(hoverNode && !tour.on && tip.style.display==="block"){
    var x=Math.min(mouse.x+16, innerWidth - tip.offsetWidth - 10);
    var y=Math.min(mouse.y+16, innerHeight - tip.offsetHeight - 10);
    tip.style.left=Math.max(0,x)+"px"; tip.style.top=Math.max(0,y)+"px";
  }
}

function linkKey(l){ var a=l.source.id||l.source, b=l.target.id||l.target; return a<b? a+"|"+b : b+"|"+a; }

var elGraph = document.getElementById("graph");
var Graph = ForceGraph3D({controlType:"orbit"})(elGraph)
  .backgroundColor("#04060f")
  .graphData({nodes:nodes, links:links})
  .nodeThreeObject(function(n){
    var r = 3.4 + (5-n.lv)*1.05 + Math.min(deg[n.id]||1,12)*0.30;
    n.__r = r;
    var mesh = new THREE.Mesh(
      new THREE.SphereGeometry(r,24,24),
      new THREE.MeshLambertMaterial({color:LV[n.lv], emissive:LV[n.lv], emissiveIntensity:0.45, transparent:true, opacity:0.95})
    );
    var halo = makeHalo(LV[n.lv], r*7);
    mesh.add(halo);
    var label = new SpriteText(n.label, 4.4, "#c6d3e6");
    label.fontFace = "Hiragino Sans, sans-serif";
    label.material.depthWrite = false; label.material.transparent = true;
    label.position.y = -(r+6);
    mesh.add(label);
    n.__mat=mesh.material; n.__halo=halo; n.__label=label; n.__mesh=mesh;
    return mesh;
  })
  .nodeVisibility(function(n){ return n.lv<=maxLv; })
  .linkVisibility(function(l){ return l.source.lv<=maxLv && l.target.lv<=maxLv; })
  .linkColor(function(l){ return actL[linkKey(l)] ? GOLD : (mode? "rgba(28,40,66,0.9)" : "rgba(95,120,170,0.8)"); })
  .linkOpacity(0.4)
  .linkWidth(function(l){ return actL[linkKey(l)] ? 1.6 : 0.35; })
  .linkDirectionalParticles(function(l){ return actL[linkKey(l)] ? 4 : 1; })
  .linkDirectionalParticleSpeed(function(l){ return actL[linkKey(l)] ? 0.011 : 0.0032; })
  .linkDirectionalParticleWidth(function(l){ return actL[linkKey(l)] ? 2.6 : 1.2; })
  .linkDirectionalParticleColor(function(l){ return actL[linkKey(l)] ? "#ffe9a8" : "#6f8fd0"; });
  // ※クリック/ホバーはライブラリのレイキャストでなく自前のスクリーン座標判定で行う（下方参照）

// 力学：分野クラスタへ緩く引き寄せ
var clusterForce = function(alpha){ nodes.forEach(function(n){
  n.vx += (n.ax-n.x)*0.055*alpha; n.vy += (n.ay-n.y)*0.055*alpha; n.vz += (0-n.z)*0.018*alpha;
});};
clusterForce.initialize = function(){};
Graph.d3Force("cluster", clusterForce);
Graph.d3Force("charge").strength(-150);
Graph.d3Force("link").distance(55);

// ---- 星空・分野ラベル ----
var scene = Graph.scene();
(function(){
  var g=new THREE.BufferGeometry(), pos=[];
  for(var i=0;i<1600;i++){ var R=900+Math.random()*1400, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    pos.push(R*Math.sin(ph)*Math.cos(th), R*Math.sin(ph)*Math.sin(th), R*Math.cos(ph)); }
  g.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({color:0x7f93bd, size:1.3, transparent:true, opacity:0.65, depthWrite:false})));
})();
Object.keys(DOMAINS).forEach(function(k){
  var d=DOMAINS[k];
  var t=new SpriteText(d.name, 13, "rgba(105,130,175,0.5)");
  t.fontFace="Hiragino Sans, sans-serif"; t.material.depthWrite=false;
  t.position.set((d.x-CX)*S, -(d.y-CY)*S + 150, -40);
  scene.add(t);
});

// ---- スタイル反映 ----
function restyle(){
  nodes.forEach(function(n){
    var on = !mode || actN[n.id];
    var top = (mode==="node" && selected && n.id===selected.id) || (mode==="con" && conRank.length && conRank[0]===n.id);
    if(n.__mat){ n.__mat.opacity = on?0.95:0.08;
      n.__mat.emissiveIntensity = top?1.1 : (on?0.45:0.06); }
    if(n.__halo) n.__halo.material.opacity = on?1:0.04;
    if(n.__label) n.__label.material.opacity = on?1:0.04;
    if(n.__mesh){ var s = top?1.35 : (mode==="con" && actN[n.id] ? 1.12 : 1); n.__mesh.scale.set(s,s,s); }
  });
  Graph.linkColor(Graph.linkColor());
  Graph.linkWidth(Graph.linkWidth());
  Graph.linkDirectionalParticles(Graph.linkDirectionalParticles());
}
function clearHL(){ actN={}; actL={}; }

var panel=document.getElementById("panel");
function guide(){
  panel.innerHTML = '<h2>操作ガイド</h2><p class="hint">👆 <b>星にマウスを近づける</b> → その場で説明がポップアップ。<br>⭐ <b>星をクリック</b> → カメラが飛び、影響しあう要素だけが金色に光ります。<br>▶ <b>自動ツアー</b> → リンクを辿って星をめぐり、着くたびに解説を表示。眺めるだけの紹介モードです（クリックやドラッグで停止）。<br>🖱 ドラッグで回転、ホイールで拡大縮小。放っておくとゆっくり自転します。<br>🎚 左上のボタンでマニアック度を絞り込み。</p>'
    + '<h3>🧭 FPツールとして使う</h3><p class="hint">「わたしの優先マップ診断」で5問答えると、優先テーマだけが星座として浮かびます。面談・セミナーの導入にどうぞ。</p>'
    + '<button class="pbtn" id="pDiag">🧭 わたしの優先マップ診断</button>';
  document.getElementById("pDiag").addEventListener("click", openDiag);
}
function clearAll(){ mode=null; selected=null; conRank=[]; clearHL(); guide(); restyle(); }

// ---- 単体選択 ----
function selectNode(n){
  mode="node"; selected=n; clearHL();
  actN[n.id]=true;
  links.forEach(function(l){
    var a=l.source.id||l.source, b=l.target.id||l.target;
    if(a===n.id||b===n.id){ actL[a<b?a+"|"+b:b+"|"+a]=true; actN[a===n.id?b:a]=true; }
  });
  var neighbors=Object.keys(actN).filter(function(id){return id!==n.id;}).map(function(id){return byId[id];})
    .filter(function(m){return m.lv<=maxLv;}).sort(function(x,y){return x.lv-y.lv;});
  panel.innerHTML = '<h2>'+n.label+'</h2>'
    + '<div class="meta"><span class="badge" style="background:'+LV[n.lv]+';color:#0a0f1c">マニアック度 L'+n.lv+'</span>'
    + '<span class="badge" style="background:rgba(70,85,115,.8)">'+DOMAINS[n.dom].name+'</span></div>'
    + '<p>'+n.desc+'</p>'
    + '<h3>🔗 影響しあう要素（'+neighbors.length+'）</h3>'
    + '<div>'+neighbors.map(function(m){return '<span class="chip" data-id="'+m.id+'" style="border-color:'+LV[m.lv]+'">'+m.label+' <small style="color:'+LV[m.lv]+'">L'+m.lv+'</small></span>';}).join("")+'</div>';
  panel.querySelectorAll(".chip").forEach(function(c){ c.addEventListener("click", function(){ var m=byId[c.dataset.id]; selectNode(m); flyTo(m); }); });
  restyle();
}
function flyTo(n, ms){
  var dist=140, dr=1+dist/Math.hypot(n.x||1,n.y||1,n.z||1);
  Graph.cameraPosition({x:n.x*dr, y:n.y*dr, z:n.z*dr}, n, ms||1300);
}

// ---- 診断（FPツール）----
var QUESTIONS = [
 {key:"age", label:"Q1. 年代は？", multi:false, opts:[
   {t:"20代", w:{saving:3,fukuri:3,nisa:3,emergency:3,humancapital:2,risktol:2,kakeibo:2}},
   {t:"30〜40代", w:{hitsuyohosho:3,kyoiku_hi:2,loan:2,nisa:2,ideco:2,hoken_seimei:2,kabe:1}},
   {t:"50代", w:{rougo:3,ideco:3,taishoku_kojo:3,dc_uketori:3,kurisage:2,torikuzushi:2,kaigo_cost:2,souzokuzei:2}},
   {t:"60代以上", w:{kurisage:3,torikuzushi:3,zaishoku:3,nini:3,kenkoujumyo:2,ninchi_toketsu:2,yuigon:2}}]},
 {key:"fam", label:"Q2. 家族は？", multi:false, opts:[
   {t:"独身", w:{emergency:2,shogai_nenkin:2,shunyuhosho:2,ideco:2}},
   {t:"夫婦（子なし）", w:{hitsuyohosho:2,izoku:2,kakyunenkin:1,pairloan:1}},
   {t:"子育て中", w:{kyoiku_hi:3,jido:3,hoken_seimei:3,shogakukin:2,izoku:2,kyoiku_ikkatsu:1}},

var diagEl=document.getElementById("diag"), qsEl=document.getElementById("qs");
function openDiag(){
  qsEl.innerHTML = QUESTIONS.map(function(q,qi){
    return '<h3>'+q.label+'</h3><div class="opts">'
      + q.opts.map(function(o,oi){ return '<span class="opt" data-q="'+qi+'" data-o="'+oi+'">'+o.t+'</span>'; }).join("")
      + '</div>';
  }).join("");
  qsEl.querySelectorAll(".opt").forEach(function(el){
    el.addEventListener("click", function(){
      var q=QUESTIONS[+el.dataset.q];
      if(!q.multi){ qsEl.querySelectorAll('.opt[data-q="'+el.dataset.q+'"]').forEach(function(x){x.classList.remove("on");}); el.classList.add("on"); }
      else el.classList.toggle("on");
    });
  });
  diagEl.style.display="block";
}
document.getElementById("diagCancel").addEventListener("click", function(){ diagEl.style.display="none"; });
document.getElementById("diagGo").addEventListener("click", function(){
  var score={};
  qsEl.querySelectorAll(".opt.on").forEach(function(el){
    var w=QUESTIONS[+el.dataset.q].opts[+el.dataset.o].w;
    Object.keys(w).forEach(function(id){ score[id]=(score[id]||0)+w[id]; });
  });
  var ranked=Object.keys(score).filter(function(id){return byId[id];})
    .sort(function(a,b){ return score[b]-score[a] || byId[a].lv-byId[b].lv; });
  if(!ranked.length){ diagEl.style.display="none"; return; }
  diagEl.style.display="none";
  applyConstellation(ranked.slice(0,12));
});
function applyConstellation(ids){
  mode="con"; selected=null; conRank=ids.slice(); clearHL();
  ids.forEach(function(id){ actN[id]=true; });
  links.forEach(function(l){
    var a=l.source.id||l.source, b=l.target.id||l.target;
    if(actN[a]&&actN[b]) actL[a<b?a+"|"+b:b+"|"+a]=true;
  });
  maxLv=5; syncLvBtns();
  Graph.nodeVisibility(Graph.nodeVisibility()); Graph.linkVisibility(Graph.linkVisibility());
  var groups=[["🥇 今すぐ向き合う",ids.slice(0,3),"rank1"],["🥈 次の一手",ids.slice(3,7),""],["📚 知っておくと違う",ids.slice(7,12),""]];
  panel.innerHTML = '<h2>⭐ あなたの優先星座</h2>'
    + '<div class="meta">回答から優先テーマ '+ids.length+' 個を抽出しました</div>'
    + groups.map(function(g){ if(!g[1].length) return "";
        return '<h3>'+g[0]+'</h3><div>'+g[1].map(function(id){ var m=byId[id];
          return '<span class="chip '+g[2]+'" data-id="'+id+'" style="border-color:'+LV[m.lv]+'">'+m.label+'</span>'; }).join("")+'</div>'; }).join("")
    + '<p class="hint" style="margin-top:12px">チップをタップすると解説へ。この画面のまま、FP面談・セミナーの「今日はどこから話すか」の合意にも使えます。</p>'
    + '<button class="pbtn" id="pReset">🌌 宇宙全体に戻る</button>';
  panel.querySelectorAll(".chip").forEach(function(c){ c.addEventListener("click", function(){ var m=byId[c.dataset.id]; selectNode(m); flyTo(m); }); });
  document.getElementById("pReset").addEventListener("click", clearAll);
  Graph.cameraPosition({x:0,y:50,z:620}, {x:0,y:0,z:0}, 1500);
  restyle();
}

var lvbtns=document.getElementById("lvbtns");
[["1","基本のみ"],["2","〜FP級"],["3","〜実務"],["4","〜専門家"],["5","全宇宙"]].forEach(function(pair){
  var b=document.createElement("button");
  b.className="lvbtn"+(pair[0]==="5"?" active":""); b.textContent="L"+pair[0]+" "+pair[1]; b.dataset.lv=pair[0];
  b.addEventListener("click", function(){
    maxLv=+pair[0]; syncLvBtns();
    if(mode==="node" && selected && selected.lv>maxLv) clearAll();
    Graph.nodeVisibility(Graph.nodeVisibility());
    Graph.linkVisibility(Graph.linkVisibility());
    restyle();

  lvbtns.appendChild(b);
});

db.className="lvbtn diag"; db.textContent="🧭 わたしの優先マップ診断";
db.addEventListener("click", openDiag);
lvbtns.appendChild(db);

// ---- 自動ツアー（リンクを辿って星をめぐる）----
var tourBtn=document.createElement("button");
tourBtn.className="lvbtn diag"; tourBtn.textContent="▶ 自動ツアー";
tourBtn.addEventListener("click", function(){ tour.on? stopTour() : startTour(); });
lvbtns.appendChild(tourBtn);

function visibleNodes(){ return nodes.filter(function(n){ return n.lv<=maxLv; }); }
function startTour(){
  tour.on=true; tour.visited={};
  controls.autoRotate=false; clearTimeout(idleT);
  tip.style.display="none";
  // 開始点: 選択中の星 → なければ全体のハブ「キャッシュフロー表」
  var start = (mode==="node" && selected && selected.lv<=maxLv) ? selected
            : (byId["cf"] && byId["cf"].lv<=maxLv ? byId["cf"] : visibleNodes()[0]);
  tourGo(start);
}
function tourGo(n){
  if(!tour.on || !n) return;
  tour.visited[n.id]=1;
  tourBtn.textContent="⏸ ツアー中 "+Object.keys(tour.visited).length+"/"+visibleNodes().length;
  selectNode(n);          // 説明パネル＋影響リンクの発光
  flyTo(n, 2200);         // ゆっくり近づく
  tour.timer=setTimeout(tourNext, 7000);
}
function tourNext(){
  if(!tour.on) return;
  var cand=[];
  if(selected) cand = adj[selected.id].map(function(id){ return byId[id]; })
    .filter(function(m){ return m.lv<=maxLv && !tour.visited[m.id]; });
  if(!cand.length) cand = visibleNodes().filter(function(m){ return !tour.visited[m.id]; });
  if(!cand.length){ stopTour(); return; }   // 全部めぐったら終了
  tourGo(cand[Math.floor(Math.random()*cand.length)]);
}
function stopTour(){
  tour.on=false; clearTimeout(tour.timer);
  tourBtn.textContent="▶ 自動ツアー";
  wake();
}
function syncLvBtns(){ lvbtns.querySelectorAll(".lvbtn").forEach(function(x){ if(x.dataset.lv) x.classList.toggle("active", x.dataset.lv==String(maxLv)); }); }

// ---- 検索 ----
document.getElementById("search").addEventListener("input", function(e){
  var q=e.target.value.trim(); if(!q) return;
  var hit=nodes.find(function(n){ return n.lv<=maxLv && (n.label.indexOf(q)>=0 || n.desc.indexOf(q)>=0); });
  if(hit){ selectNode(hit); flyTo(hit); }
});

// ---- 自動回転 ----
var controls=Graph.controls();
controls.autoRotate=true; controls.autoRotateSpeed=0.55;
var idleT;
function wake(){ controls.autoRotate=false; clearTimeout(idleT); idleT=setTimeout(function(){controls.autoRotate=true;},18000); }
elGraph.addEventListener("wheel", function(){ if(tour.on) stopTour(); else wake(); }, {passive:true});

// ---- 自前の当たり判定（画面上で星の近くならヒット＝少し離れていてもOK）----
function pickAt(px, py){
  var cam=Graph.camera(), w=elGraph.clientWidth, h=elGraph.clientHeight;
  if(!cam) return null;
  var tanH=Math.tan((cam.fov||75)*0.5*Math.PI/180);
  var best=null, bestD=1e9;
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i]; if(n.lv>maxLv) continue;
    var v=new THREE.Vector3(n.x||0, n.y||0, n.z||0).project(cam);
    if(v.z>1 || v.z<-1) continue;   // カメラの後ろ・範囲外
    var sx=(v.x+1)/2*w, sy=(1-v.y)/2*h;
    var dist=Math.hypot((n.x||0)-cam.position.x, (n.y||0)-cam.position.y, (n.z||0)-cam.position.z);
    var rScr=(n.__r||5)*(h/2)/(tanH*Math.max(dist,1));   // 星の見かけ半径(px)
    var th=Math.max(26, rScr*1.9);                        // 判定半径：見かけの約2倍
    var d=Math.hypot(sx-px, sy-py);
    if(d<th && d<bestD){ bestD=d; best=n; }
  }
  return best;
}
var mouseIn=false, downAt=null;
function runPick(){
  var n = mouseIn ? pickAt(mouse.x, mouse.y) : null;
  if(n!==hoverNode){ hoverNode=n; elGraph.style.cursor = n? "pointer":"default"; }
  updateTip();
}
elGraph.addEventListener("pointermove", function(e){ mouse.x=e.clientX; mouse.y=e.clientY; mouseIn=true; runPick(); });
elGraph.addEventListener("pointerleave", function(){ mouseIn=false; runPick(); });
elGraph.addEventListener("pointerdown", function(e){
  downAt={x:e.clientX, y:e.clientY, t:Date.now()};
  if(tour.on) stopTour(); else wake();
});
elGraph.addEventListener("pointerup", function(e){
  if(!downAt) return;
  var moved=Math.hypot(e.clientX-downAt.x, e.clientY-downAt.y), dt=Date.now()-downAt.t;
  downAt=null;
  if(moved>6 || dt>600) return;    // ドラッグ（回転操作）はクリック扱いしない
  var n=pickAt(e.clientX, e.clientY);
  if(n){ selectNode(n); flyTo(n); } else clearAll();
});
// 一時デバッグ窓口（原因特定後に削除）
window.__dbg = {
  pick: pickAt,
  proj: function(id){ var n=byId[id]; if(!n) return null; var cam=Graph.camera();
    var v=new THREE.Vector3(n.x||0,n.y||0,n.z||0).project(cam);
    return {pos:[n.x,n.y,n.z], ndc:[v.x,v.y,v.z],
      scr:[(v.x+1)/2*elGraph.clientWidth,(1-v.y)/2*elGraph.clientHeight]}; },
  state: function(){ return {mouseIn:mouseIn, mouse:mouse, hover:hoverNode&&hoverNode.id,
    w:elGraph.clientWidth, h:elGraph.clientHeight, camPos:Graph.camera().position}; }
};
(function pickLoop(){               // 自転などで星側が動いた場合もホバー判定が追従
  requestAnimationFrame(pickLoop);
  if(mouseIn) runPick();
})();

guide();

})();
